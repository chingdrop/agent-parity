# Production overrides — applied explicitly:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Gunicorn (the image default CMD), no bind mounts, restart policies, scaled
# workers, and secrets taken from the deployment environment rather than a
# local .env file. Run migrations as a one-off:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     run --rm web python manage.py migrate

services:
  db:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  web:
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS must be set}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}

  worker:
    restart: unless-stopped
    deploy:
      replicas: 2
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}

  beat:
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
