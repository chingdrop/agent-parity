# S3-compatible object storage (MinIO) for locally exercising the real
# AD-export handoff path (see agent_parity/storage.py). Everything else in
# this package runs directly via `uv run agent-parity` — no other services
# needed.

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agent_parity}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agent_parity_minio}
    volumes:
      - miniodata:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  miniodata:
