# Bare-bones local dev/test setup for agent-parity:
#
# * `agent-parity` — builds docker/Dockerfile so the CLI can be run without a
#   local uv install: `docker compose run agent-parity run`. Runs fully
#   offline against sample_data/ by default (no .env required) — pass
#   `--env-file ../.env` on the command line for live credentials.
# * `minio` — S3-compatible object storage for locally exercising the real
#   AD-export handoff path (see agent_parity/storage.py). Everything else in
#   this package runs directly via `uv run agent-parity` — no other services
#   needed.
#
# cyberhub's own deployment supersedes this entirely once this package is
# consumed there; this is just enough to run things standalone if needed.

services:
  agent-parity:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../sample_data:/app/sample_data:ro
      - ../output:/app/output
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agent_parity}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agent_parity_minio}
    volumes:
      - miniodata:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  miniodata:
