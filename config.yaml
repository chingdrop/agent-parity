# agent-parity configuration: one organization, one security console.
#
# This file is safe to commit: every secret value is a ${VAR} reference
# resolved from the environment at load time (see .env.example for the
# variable names). A ${VAR} pointing at an *unset* variable resolves to
# null, which puts the connector into fixture mode against sample_data/ —
# so a fresh checkout with no .env runs the full pipeline on synthetic data.

stale_days: 14

# Any vendor registered in agent_parity.connectors.CONNECTOR_CLASSES works
# here (sentinelone / carbonblack / bitdefender today) — adding support for
# another vendor is writing one connector class, not editing this file's
# structure.
vendor: sentinelone
credentials:
  api_url: ${SENTINELONE_API_URL}
  api_token: ${SENTINELONE_API_TOKEN}

# Domain-joined endpoint(s) the AD export script is pushed to — one per AD
# domain/forest the organization spans. Most orgs are single-domain.
ad_target_devices:
  - ACME-DC01

# Object-storage handoff for the AD export — required for any live vendor
# connector. Vendor remote-execution output channels (SentinelOne RSO,
# Carbon Black Live Response) don't reliably preserve a CSV's exact
# formatting and have real output-size limits a full AD export can exceed,
# so the remote script uploads its CSV directly to object storage via a
# short-lived presigned URL instead of returning it through the vendor
# channel. Built against the S3 API (boto3): point endpoint_url at a
# self-hosted MinIO instance (docker/docker-compose.yml runs one) for
# local/dev use, or leave it unset to use real AWS S3 in production — same
# code either way. Unconfigured (the uv demo default, since these all
# resolve to null with no .env) is only valid because the demo path has no
# live vendor credentials either — no script ever actually runs.
storage:
  backend: s3
  endpoint_url: ${STORAGE_ENDPOINT_URL}
  bucket: ${STORAGE_BUCKET}
  access_key: ${STORAGE_ACCESS_KEY}
  secret_key: ${STORAGE_SECRET_KEY}
  region: ${STORAGE_REGION}
